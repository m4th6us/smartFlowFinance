name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    env:
      VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_APP_BASE_PATH: ${{ vars.VITE_APP_BASE_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve GitHub Pages base path
        run: |
          if [ -z "$VITE_APP_BASE_PATH" ]; then
            echo "VITE_APP_BASE_PATH=/${GITHUB_REPOSITORY#*/}" >> "$GITHUB_ENV"
          fi

      - name: Validate public app config
        run: |
          missing=""
          if [ -z "$VITE_SUPABASE_PROJECT_ID" ]; then missing="$missing VITE_SUPABASE_PROJECT_ID"; fi
          if [ -z "$VITE_SUPABASE_URL" ]; then missing="$missing VITE_SUPABASE_URL"; fi
          if [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]; then missing="$missing VITE_SUPABASE_PUBLISHABLE_KEY"; fi
          if [ -n "$missing" ]; then
            echo "Missing required GitHub Actions variables/secrets:$missing"
            exit 1
          fi

      - name: Build static app
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
