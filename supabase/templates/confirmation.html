<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirme seu cadastro</title>
  </head>
  <body style="margin: 0; background: #f4f7fb; font-family: Arial, sans-serif; color: #102033">
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="background: #f4f7fb; padding: 32px 16px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="max-width: 520px; overflow: hidden; border-radius: 14px; background: #ffffff"
          >
            <tr>
              <td style="padding: 28px 28px 8px">
                <h1 style="margin: 0; color: #0b4f6c; font-size: 24px; line-height: 1.25">
                  Confirme seu e-mail
                </h1>
                <p style="margin: 16px 0 0; font-size: 15px; line-height: 1.6">
                  Olá! Recebemos um pedido para criar uma conta no SmartFlowFinance usando este
                  e-mail.
                </p>
                <p style="margin: 12px 0 0; font-size: 15px; line-height: 1.6">
                  Para concluir seu cadastro e acessar seu painel financeiro, confirme o endereço
                  abaixo.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 20px 28px">
                <a
                  href="{{ .ConfirmationURL }}"
                  style="
                    display: inline-block;
                    border-radius: 10px;
                    background: #0b4f6c;
                    padding: 13px 18px;
                    color: #ffffff;
                    font-size: 15px;
                    font-weight: 700;
                    text-decoration: none;
                  "
                >
                  Confirmar cadastro
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding: 0 28px 28px">
                <p style="margin: 0; font-size: 13px; line-height: 1.6; color: #5b6b7a">
                  Se você não criou essa conta, ignore este e-mail. Nenhuma ação será necessária.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
